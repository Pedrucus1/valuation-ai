name: Scraper Mensual

on:
  # Día 2 de cada mes a las 3:00am UTC
  schedule:
    - cron: "0 3 2 * *"
  # Ejecución manual desde GitHub Actions tab
  workflow_dispatch:
    inputs:
      portal:
        description: "Portal específico (vacío = todos)"
        required: false
        default: ""
      solo_scrape:
        description: "Solo scrape sin enricher (true/false)"
        required: false
        default: "false"

# ─── Reutilizable: setup Python + Playwright + credenciales ───────────────────
# (cada job lo repite porque cada uno corre en una VM fresca)

jobs:

  # ── 1. SCRAPE — portales secuenciales en una sola VM ─────────────────────────
  scrape:
    name: "Scrape: ${{ github.event.inputs.portal || 'todos' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 300

    defaults:
      run:
        working-directory: scraper-inmuebles

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper-inmuebles/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar Playwright + Chromium
        run: playwright install chromium --with-deps

      - name: Credenciales y .env
        env:
          CREDENTIALS_JSON: ${{ secrets.SCRAPER_CREDENTIALS_JSON }}
        run: |
          echo "$CREDENTIALS_JSON" > credentials.json
          printf "GOOGLE_SHEET_ID=%s\nMONGO_URL=%s\nDB_NAME=propvalu\nSCRAPING_DELAY_MIN=5\nSCRAPING_DELAY_MAX=12\nMAX_RETRIES=3\nLOG_LEVEL=INFO\n" \
            "${{ secrets.GOOGLE_SHEET_ID }}" "${{ secrets.MONGO_URL }}" > .env

      - name: Scrape INMUEBLES24
        if: ${{ github.event.inputs.portal == '' || github.event.inputs.portal == 'INMUEBLES24' }}
        run: python scheduler.py --portal INMUEBLES24
        continue-on-error: true

      - name: Scrape CASAS_Y_TERRENOS
        if: ${{ github.event.inputs.portal == '' || github.event.inputs.portal == 'CASAS_Y_TERRENOS' }}
        run: python scheduler.py --portal CASAS_Y_TERRENOS
        continue-on-error: true

      - name: Scrape MITULA
        if: ${{ github.event.inputs.portal == '' || github.event.inputs.portal == 'MITULA' }}
        run: python scheduler.py --portal MITULA
        continue-on-error: true

      - name: Scrape VIVANUNCIOS
        if: ${{ github.event.inputs.portal == '' || github.event.inputs.portal == 'VIVANUNCIOS' }}
        run: python scheduler.py --portal VIVANUNCIOS
        continue-on-error: true

      - name: Scrape PINCALI
        if: ${{ github.event.inputs.portal == '' || github.event.inputs.portal == 'PINCALI' }}
        run: python scheduler.py --portal PINCALI
        continue-on-error: true

      - name: Limpiar archivos sensibles
        if: always()
        run: rm -f credentials.json .env

  # ── 2. ENRICH — 5 portales en paralelo, cada uno en su VM ────────────────────
  enrich:
    name: "Enrich: ${{ matrix.portal }}"
    needs: scrape
    if: ${{ github.event.inputs.solo_scrape != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      matrix:
        portal: [INMUEBLES24, VIVANUNCIOS, MITULA, PINCALI, CASAS_Y_TERRENOS]
      fail-fast: false   # si un portal falla, los demás siguen

    defaults:
      run:
        working-directory: scraper-inmuebles

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper-inmuebles/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar Playwright + Chromium
        run: playwright install chromium --with-deps

      - name: Credenciales y .env
        env:
          CREDENTIALS_JSON: ${{ secrets.SCRAPER_CREDENTIALS_JSON }}
        run: |
          echo "$CREDENTIALS_JSON" > credentials.json
          printf "GOOGLE_SHEET_ID=%s\nMONGO_URL=%s\nDB_NAME=propvalu\nSCRAPING_DELAY_MIN=5\nSCRAPING_DELAY_MAX=12\nMAX_RETRIES=3\nLOG_LEVEL=INFO\n" \
            "${{ secrets.GOOGLE_SHEET_ID }}" "${{ secrets.MONGO_URL }}" > .env

      - name: Enrich ${{ matrix.portal }}
        run: python enricher.py --tab ${{ matrix.portal }}
        continue-on-error: true

      - name: Limpiar archivos sensibles
        if: always()
        run: rm -f credentials.json .env

  # ── 3. SYNC — Sheets → MongoDB al final ──────────────────────────────────────
  sync-mongo:
    name: Sync Sheets → MongoDB
    needs: enrich
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: always()   # corre aunque algún enrich haya fallado

    steps:
      - name: Trigger sync en backend PropValu
        env:
          BACKEND_URL: ${{ secrets.PROPVALU_BACKEND_URL }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          curl -s -X POST "$BACKEND_URL/api/admin/mercado/sync-sheets" \
            -H "x-admin-token: $ADMIN_SECRET" \
            -H "Content-Type: application/json" \
            -d "{}" \
            --max-time 300 \
            -w "\nHTTP %{http_code}\n"
